<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부산 방탈출 정복 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .popup-content { font-family: sans-serif; min-width: 180px; max-height: 300px; overflow-y: auto; }
        .theme-item { margin: 5px 0; display: flex; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        .completed-marker { filter: hue-rotate(150deg) brightness(0.9); z-index: 1000 !important; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([35.1796, 129.0756], 12); // 부산 중심
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 업데이트된 데이터 (큐방탈출, 부산 이스케이프 제외)
        const escapeRooms = [
            { id: "beatphobia_seomyeon", name: "비트포비아 서면 던전", coords: [35.1531, 129.0596], themes: ["오늘 나는", "꿈의 공장", "날씨의 신", "당감동 정육점", "지하터널-2H", "고시원 살인사건", "Bar Solvay", "산장으로의 초대", "부활", "엘도라도", "AMEN", "부적", "어느 수집가의 집"] },
            { id: "murderparker_busan", name: "머더파커 부산점", coords: [35.1558, 129.0585], themes: ["사라진 보물2056", "액션(Action)", "도굴왕", "잭(JACK)", "레디(Ready)"] },
            { id: "secret_garden_seomyeon", name: "비밀의 화원 서면점", coords: [35.1542, 129.0608], themes: ["블라인드", "아뜰리에", "비밀의 화원", "컬러즈", "슈퍼 엔지니어", "연애학개론", "베이비 레이스"] },
            { id: "rooms_a_seomyeon", name: "룸즈에이 부산서면점", coords: [35.1540, 129.0600], themes: ["너와 나의 이야기", "프레임 하이커", "히어로 아카데미", "퍼펙트 플랜", "요정들의 술집", "아직 버리지못한 지갑"] },
            { id: "dumb_dumber_seomyeon", name: "덤앤더머 서면점", coords: [35.1538, 129.0602], themes: ["작전명: 옵저버", "기담", "휴가중", "글램핑", "소공녀", "Knock Knock", "크라임시티", "푸른수염", "투 앨리스", "X테마", "러브클리닉", "동전노래방"] },
            { id: "playpoint_seomyeon", name: "플레이포인트랩", coords: [35.1545, 129.0602], themes: ["집으로", "모모게임", "그날 사진관", "재: 트라우마", "스팀 스파이어 사가", "근비빌라401호", "토이메이커", "F등급킬러: 다정리"] },
            { id: "diaegg_busan", name: "다이아에그", coords: [35.1540, 129.0605], themes: ["레드룸", "닥터 슈나벨", "신입사원", "우시마을", "무료한 하루", "키키키키키", "그래버", "노키즈존", "개연성", "회귀"] },
            { id: "mission_pnu", name: "미션 이스케이프 부산대점", coords: [35.2315, 129.0863], themes: ["비밀프로젝트", "영재는 못말려", "타짜", "신입사원", "변호사 업무일지"] },
            { id: "therock_pnu", name: "더락 이스케이프 부산대점", coords: [35.2310, 129.0880], themes: ["루시드 드리밍", "하울의 안 움직이는 성", "최후의 만찬", "절대반지의 비밀", "의뢰인"] },
            { id: "therock_ksu", name: "더락 이스케이프 경성대점", coords: [35.1375, 129.0995], themes: ["선과 칠호의 행방불명", "편의점을 털어라", "우리 집에 왜 왔니", "오리엔탈 특급열차 살인사건", "산장편"] },
            { id: "sherlock_gijang", name: "셜록홈즈 기장정관점", coords: [35.3223, 129.1771], themes: ["유품정리사", "트라이앵글"] }
        ];

        let progress = JSON.parse(localStorage.getItem('escapeProgress')) || {};

        function updateMap() {
            map.eachLayer(l => { if (l instanceof L.Marker) map.removeLayer(l); });
            escapeRooms.forEach(room => {
                const doneThemes = progress[room.id] || [];
                const isAllDone = room.themes.length > 0 && room.themes.every(t => doneThemes.includes(t));
                const marker = L.marker(room.coords).addTo(map);
                if (isAllDone) marker._icon.classList.add('completed-marker');

                const popup = document.createElement('div');
                popup.className = 'popup-content';
                popup.innerHTML = `<b>${room.name}</b> (${doneThemes.length}/${room.themes.length})<br><br>`;
                room.themes.forEach(t => {
                    const checked = doneThemes.includes(t) ? 'checked' : '';
                    popup.innerHTML += `<div class="theme-item"><input type="checkbox" onchange="toggle('${room.id}','${t}')" ${checked}> ${t}</div>`;
                });
                marker.bindPopup(popup);
            });
        }

        window.toggle = (id, theme) => {
            if (!progress[id]) progress[id] = [];
            const idx = progress[id].indexOf(theme);
            if (idx > -1) progress[id].splice(idx, 1);
            else progress[id].push(theme);
            localStorage.setItem('escapeProgress', JSON.stringify(progress));
            updateMap();
        };

        updateMap();
    </script>
</body>
</html>
