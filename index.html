<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부산 방탈출 정복 현황판</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <style>
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: #f4f4f4; }
        #map { height: 40vh; width: 100%; border-bottom: 2px solid #ddd; }
        .container { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .menu-bar { display: flex; gap: 10px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-export { background: #3498db; color: white; }
        .btn-import { background: #e67e22; color: white; }
        .btn:hover { opacity: 0.8; }
        
        h2 { border-left: 5px solid #2ecc71; padding-left: 10px; margin: 20px 0; }
        .region-section { background: white; border-radius: 10px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .region-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .room-table { width: 100%; border-collapse: collapse; }
        .room-table td { padding: 10px; border-bottom: 1px solid #fafafa; }
        .theme-pill { display: inline-block; padding: 4px 10px; border-radius: 15px; font-size: 0.8rem; margin: 2px; cursor: pointer; border: 1px solid #ddd; }
        .theme-pill.done { background: #2ecc71; color: white; border-color: #27ae60; }
        .completed-marker { filter: hue-rotate(150deg) brightness(0.9); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="container">
        <div class="menu-bar">
            <button class="btn btn-export" onclick="exportData()">📤 내 데이터 복사 (공유하기)</button>
            <button class="btn btn-import" onclick="importData()">📥 데이터 불러오기</button>
        </div>

        <h2>🚩 부산 방탈출 정복 리스트</h2>
        <div id="status-list"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script>
        const map = L.map('map').setView([35.1796, 129.0756], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const markers = L.markerClusterGroup();

        const escapeRooms = [
            { id: "key_deokcheon", region: "덕천", name: "키이스케이프 부산점", coords: [35.211021, 129.007156], themes: ["파파라치", "난쟁이의 장난", "신비의 숲", "셜록", "정신병동"] },
            { id: "escape_hadan_1", region: "하단", name: "이스케이프탑 하단점", coords: [35.106521, 128.966952], themes: ["해적", "킹스맨", "여고괴담", "마법사"] },
            { id: "sherlock_hadan", region: "하단", name: "셜록홈즈 하단점", coords: [35.106231, 128.967812], themes: ["무속인 살인사건", "빛과 그림자", "혼"] },
            { id: "thelock_nampo", region: "남포", name: "더락 남포점", coords: [35.098862, 129.029811], themes: ["보물선", "감옥탈출", "피라미드"] },
            { id: "mystery_nampo", region: "남포", name: "코드미스터리 남포점", coords: [35.099451, 129.030421], themes: ["여고괴담", "아트 미스터리", "프리즌"] },
            { id: "thelock_ksu", region: "경성대", name: "더락 경성대점", coords: [35.137521, 129.099522], themes: ["행방불명", "편의점", "우리집", "특급열차", "산장"] },
            { id: "breakout_gwangan", region: "광안", name: "브레이크아웃 광안리점", coords: [35.150531, 129.115312], themes: ["테라포밍", "호쿠스", "한의원", "우체국"] },
            { id: "playpoint_haeundae", region: "해운대", name: "플레이포인트랩 해운대점", coords: [35.159421, 129.161022], themes: ["BANG", "문앞에벨", "별의별", "리허설", "몽글숲"] },
            { id: "bp_dungeon", region: "서면", name: "비트포비아 서면 던전", coords: [35.153121, 129.059611], themes: ["오늘 나는", "꿈의 공장", "날씨의 신"] },
            { id: "bp_red", region: "서면", name: "비트포비아 던전 레드", coords: [35.152851, 129.059321], themes: ["당감동 정육점", "고시원", "산장", "AMEN", "부적"] },
            { id: "mp_busan", region: "서면", name: "머더파커 부산점", coords: [35.155821, 129.058511], themes: ["사라진 보물", "액션", "도굴왕", "잭", "레디"] },
            { id: "pp_origin", region: "서면", name: "플레이포인트랩 오리진", coords: [35.154521, 129.060211], themes: ["집으로", "모모게임", "그날 사진관", "재: 트라우마"] },
            { id: "pp_tantan", region: "서면", name: "플레이포인트랩 탄탄", coords: [35.154811, 129.060522], themes: ["스팀 스파이어", "근비빌라", "토이메이커"] }
            // ... (기존 31개 지점 데이터 유지)
        ];

        let progress = JSON.parse(localStorage.getItem('escapeProgress')) || {};

        // [내보내기] 기능을 통해 현재 진행상황을 텍스트로 복사
        window.exportData = () => {
            const dataStr = btoa(encodeURIComponent(JSON.stringify(progress))); // 암호화
            navigator.clipboard.writeText(dataStr).then(() => {
                alert("체크 내역이 클립보드에 복사되었습니다! 친구에게 카톡으로 보내주세요.");
            });
        };

        // [불러오기] 기능을 통해 친구의 데이터 적용
        window.importData = () => {
            const input = prompt("친구에게 받은 데이터를 붙여넣으세요:");
            if (input) {
                try {
                    const decoded = JSON.parse(decodeURIComponent(atob(input)));
                    if (confirm("기존 내역을 지우고 친구의 데이터를 불러올까요?")) {
                        progress = decoded;
                        localStorage.setItem('escapeProgress', JSON.stringify(progress));
                        location.reload(); // 새로고침하여 적용
                    }
                } catch (e) {
                    alert("잘못된 데이터 형식입니다.");
                }
            }
        };

        function renderList() {
            const listDiv = document.getElementById('status-list');
            listDiv.innerHTML = '';
            const grouped = {};
            escapeRooms.forEach(room => {
                if (!grouped[room.region]) grouped[room.region] = [];
                grouped[room.region].push(room);
            });

            for (const region in grouped) {
                const section = document.createElement('div');
                section.className = 'region-section';
                let html = `<div class="region-title">📍 ${region}</div><table class="room-table">`;
                grouped[region].forEach(room => {
                    const doneThemes = progress[room.id] || [];
                    html += `<tr><td style="width:30%">${room.name}</td><td>`;
                    room.themes.forEach(t => {
                        const isDone = doneThemes.includes(t) ? 'done' : '';
                        html += `<span class="theme-pill ${isDone}" onclick="toggle('${room.id}','${t}')">${t}</span>`;
                    });
                    html += `</td></tr>`;
                });
                html += `</table>`;
                section.innerHTML = html;
                listDiv.appendChild(section);
            }
        }

        function updateMap() {
            markers.clearLayers();
            escapeRooms.forEach(room => {
                const doneThemes = progress[room.id] || [];
                const isAllDone = room.themes.length > 0 && room.themes.every(t => doneThemes.includes(t));
                const marker = L.marker(room.coords);
                if (isAllDone) {
                    const icon = L.divIcon({ html: '<img src="https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png" class="completed-marker">' });
                    marker.setIcon(icon);
                }
                marker.bindPopup(`<b>${room.name}</b>`);
                markers.addLayer(marker);
            });
            map.addLayer(markers);
        }

        window.toggle = (id, theme) => {
            if (!progress[id]) progress[id] = [];
            const idx = progress[id].indexOf(theme);
            if (idx > -1) progress[id].splice(idx, 1);
            else progress[id].push(theme);
            localStorage.setItem('escapeProgress', JSON.stringify(progress));
            updateMap();
            renderList();
        };

        updateMap();
        renderList();
    </script>
</body>
</html>
